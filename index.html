<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Index - list.csv</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #0f1620;
      --border: #233246;
      --text: #e6edf3;
      --muted: #8aa0b6;
      --accent: #7cfc00;
      --accent2: #4ad6ff;
      --tag-bg: rgba(124, 252, 0, 0.08);
      --tag-border: rgba(124, 252, 0, 0.22);
      --shadow: rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(1200px 600px at 20% -10%, rgba(74,214,255,0.12), transparent 60%),
                  radial-gradient(900px 500px at 85% 0%, rgba(124,252,0,0.10), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(11, 15, 20, 0.85);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }

    .topline {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .title {
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .counter {
      color: var(--accent2);
      border: 1px solid rgba(74,214,255,0.25);
      background: rgba(74,214,255,0.08);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 220px;
      flex: 1 1 auto;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input[type="search"], select {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      outline: none;
    }

    input[type="search"]::placeholder { color: rgba(138,160,182,0.7); }
    input[type="search"]:focus, select:focus { border-color: rgba(124,252,0,0.55); box-shadow: 0 0 0 3px rgba(124,252,0,0.10); }

    .wrap {
      height: calc(100vh - 98px);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 900px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(15, 22, 32, 0.95);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 7px 9px;
      text-align: left;
      white-space: nowrap;
      z-index: 10;
    }

    tbody td {
      padding: 6px 9px;
      border-bottom: 1px solid rgba(35, 50, 70, 0.7);
      vertical-align: middle;
      font-size: 14px;
    }

    tbody tr:hover { background: rgba(124,252,0,0.04); }

    .col-date { width: 105px; }
    .col-year { width: 70px; }
    .col-path { width: 220px; }
    .col-tags { width: 240px; }
    .col-name { width: auto; }

    /* Prevent long titles from visually overflowing on small screens. */
    td.col-name, th.col-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0; /* required for ellipsis in some browsers */
    }

    .mono-dim { color: var(--muted); }

    .pill {
      display: inline-block;
      padding: 2.5px 7px;
      border-radius: 999px;
      border: 1px solid var(--tag-border);
      background: var(--tag-bg);
      color: rgba(230, 237, 243, 0.95);
      font-size: 13px;
      margin: 2px 6px 2px 0;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    mark {
      background: rgba(124,252,0,0.16);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 2px;
    }

    .status {
      padding: 44px 16px;
      color: var(--muted);
      text-align: center;
    }

    .status .icon {
      display: block;
      font-size: 28px;
      margin-bottom: 10px;
      opacity: 0.6;
    }

    .mono-err { color: #ff8a7a; }

    @media (max-width: 700px) {
      /* Keep a wide table so horizontal scroll stays available
         instead of squeezing the title column to ~0 width. */
      table { min-width: 900px; table-layout: fixed; }
      .col-date { width: 85px; }
      .col-year { width: 60px; }
      .col-path { width: 130px; }
      .col-tags { width: 130px; }
      .pill { font-size: 12px; margin: 2px 5px 2px 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topline">
      <div class="title">mlmongo.py index [<a href=""/catalog.html">catalog</a>]</div>
      <div class="counter" id="counter">—</div>
    </div>
    <div class="controls">
      <div class="control">
        <label for="search">search</label>
        <input type="search" id="search" placeholder="cerca per titolo..." autocomplete="off" spellcheck="false" disabled>
      </div>
        <div class="control" style="min-width: 230px; flex: 0 0 auto;">
          <label for="tag-filter">tag</label>
          <select id="tag-filter" disabled>
            <option value="">tutti i tag</option>
          </select>
        </div>
        <div class="control" style="min-width: 230px; flex: 0 0 auto;">
          <label for="path-filter">path</label>
          <select id="path-filter" disabled>
            <option value="">tutti i percorsi</option>
          </select>
        </div>
    </div>
  </header>

  <div class="wrap">
    <div class="status" id="status">
      <span class="icon">◌</span>caricamento...
    </div>

    <table id="table" style="display:none">
      <thead>
        <tr>
          <th class="col-date">Data</th>
          <th class="col-name">Titolo</th>
          <th class="col-year">Anno</th>
          <th class="col-tags">Tag</th>
          <th class="col-path">Percorso</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    let DATA = [];

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function highlight(text, query) {
      const q = (query || "").trim();
      if (!q) return esc(text);
      const safe = esc(text);
      const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\\\$&');
      return safe.replace(new RegExp('(' + safeQ + ')', 'gi'), '<mark>$1</mark>');
    }

    // Minimal CSV parser (handles quotes) + delimiter detection.
    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      if (lines.length === 0) return [];

      const tryDelims = [';', ',', '\t'];
      const parseWithDelim = (linesToParse, delim) => {
        const sep = delim;
        const rows = [];
        for (const line of linesToParse) {
          const out = [];
          let cur = '';
          let inQuotes = false;
          for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
              // Double quote escape: ""
              if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
              else { inQuotes = !inQuotes; }
              continue;
            }
            if (!inQuotes && ch === sep) { out.push(cur); cur = ''; continue; }
            cur += ch;
          }
          out.push(cur);
          rows.push(out);
        }
        return rows;
      };

      // Detect delimiter by maximizing number of columns in header.
      let best = null;
      for (const d of tryDelims) {
        const headerRows = parseWithDelim([lines[0]], d);
        const cols = (headerRows[0] && headerRows[0].length) ? headerRows[0].length : 0;
        // Prefer the one that yields 5 columns (path,name,tag,year,time) but fall back gracefully.
        if (!best || Math.abs(cols - 5) < Math.abs(best.cols - 5)) best = { d, cols };
      }

      const rows = best ? parseWithDelim(lines, best.d) : parseWithDelim(lines, ';');
      const header = rows[0].map(x => String(x).trim());
      const idx = {};
      header.forEach((h, i) => { idx[h] = i; });

      // Expected headers from mlmongo.py
      const get = (r, key) => r[idx[key]] ?? '';

      // Skip header row.
      const data = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r || r.length === 0) continue;

        // If the file doesn't match expected columns, ignore the row.
        const p = get(r, 'path');
        const n = get(r, 'name');
        const t = get(r, 'tag');
        const y = get(r, 'year');
        const d = get(r, 'time');
        if (p === '' && n === '') continue;

        data.push({
          p: p,
          n: n,
          tag: t,
          y: y,
          t: d
        });
      }

      return data;
    }

    function render(query, pathFilter, tagFilter) {
      const q = (query || '').trim().toLowerCase();
      const pf = pathFilter || '';
      const tf = tagFilter || '';

      let filtered = DATA;
      if (q) filtered = filtered.filter(r => (r.n || '').toLowerCase().includes(q));
      if (pf) filtered = filtered.filter(r => r.p === pf);
      if (tf) {
        filtered = filtered.filter(r => {
          const parts = String(r.tag || '').split(',').map(s => s.trim()).filter(Boolean);
          return parts.includes(tf);
        });
      }

      const counter = document.getElementById('counter');
      const tbody = document.getElementById('tbody');
      const status = document.getElementById('status');
      const table = document.getElementById('table');

      counter.textContent = filtered.length.toLocaleString('it-IT') + ' risultati';

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        table.style.display = 'none';
        status.innerHTML = '<span class="icon">◌</span>nessun risultato';
        status.style.display = '';
        return;
      }

      status.style.display = 'none';
      table.style.display = '';
      tbody.innerHTML = filtered.map(r => {
        const tags = String(r.tag || '').split(',').map(s => s.trim()).filter(Boolean);
        const tagsHtml = tags.length
          ? tags.map(tag => '<span class="pill">' + esc(tag) + '</span>').join('')
          : '<span class="mono-dim">—</span>';
        return `
          <tr>
            <td class="col-date">${esc(r.t)}</td>
            <td class="col-name">${highlight(r.n, query)}</td>
            <td class="col-year mono-dim">${esc(r.y)}</td>
            <td class="col-tags">${tagsHtml}</td>
            <td class="col-path">${esc(r.p)}</td>
          </tr>
        `;
      }).join('');
    }

    function populateSelect(id, values) {
      const sel = document.getElementById(id);
      sel.innerHTML = '';
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = id === 'path-filter' ? 'tutti i percorsi' : 'tutti i tag';
      sel.appendChild(defaultOpt);
      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        sel.appendChild(opt);
      });
    }

    async function init() {
      const status = document.getElementById('status');
      try {
        const res = await fetch('list.csv');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();

        DATA = parseCSV(text);
        DATA.sort((a, b) => String(b.t).localeCompare(String(a.t)));

        const search = document.getElementById('search');
        const pathFilter = document.getElementById('path-filter');
        const tagFilter = document.getElementById('tag-filter');

        const paths = [...new Set(DATA.map(r => r.p).filter(Boolean))].sort();
        const tags = [...new Set(DATA.flatMap(r => String(r.tag || '').split(',').map(s => s.trim()).filter(Boolean)))].sort();

        populateSelect('path-filter', paths);
        populateSelect('tag-filter', tags);

        search.disabled = false;
        pathFilter.disabled = false;
        tagFilter.disabled = false;

        const get = () => ({ q: search.value, p: pathFilter.value, tg: tagFilter.value });
        search.addEventListener('input', () => { const v = get(); render(v.q, v.p, v.tg); });
        pathFilter.addEventListener('change', () => { const v = get(); render(v.q, v.p, v.tg); });
        tagFilter.addEventListener('change', () => { const v = get(); render(v.q, v.p, v.tg); });

        document.addEventListener('keydown', (e) => {
          if (e.key !== 'Escape') return;
          search.value = '';
          pathFilter.value = '';
          tagFilter.value = '';
          render('', '', '');
          search.focus();
        });

        render('', '', '');
        search.focus();
      } catch (err) {
        status.innerHTML = '<span class="icon mono-err">✕</span>impossibile caricare list.csv<br><small class="mono-err" style="display:block;opacity:.9;margin-top:6px;">' + esc(err.message || String(err)) + '</small>';
      }
    }

    init();
  </script>
</body>
</html>
