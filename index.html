<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mlmongo.py output</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #131316; --border: #222228; --border-hover: #3a3a45;
    --accent: #c8f03e; --accent-dim: rgba(200,240,62,0.12);
    --text: #e8e8ec; --text-muted: #5a5a68; --text-mid: #9898aa; --tag-bg: #1a1a20;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
  header { padding: 2.5rem 1.5rem 1.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,13,15,0.92); backdrop-filter: blur(12px); z-index: 100; }
  .header-top { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.6rem, 5vw, 2.4rem); letter-spacing: -0.03em; color: var(--text); line-height: 1; }
  .count-badge { font-size: 0.7rem; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(200,240,62,0.25); padding: 0.2em 0.6em; border-radius: 2px; letter-spacing: 0.08em; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; width: 15px; height: 15px; }
  #search { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem; padding: 0.7rem 1rem 0.7rem 2.4rem; border-radius: 4px; outline: none; transition: border-color 0.2s; letter-spacing: 0.02em; }
  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--accent); }
  #search:disabled { opacity: 0.4; cursor: not-allowed; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; height: calc(100vh - var(--header-h, 120px)); overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; table-layout: fixed; }
  th { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding: 0.75rem 1.2rem; text-align: left; border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; position: sticky; top: 0; z-index: 10; }
  .col-date { width: 7rem; }
  .col-year { width: 4.5rem; }
  .col-path { width: 8rem; }
  .col-name { width: auto; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:hover { background: rgba(200,240,62,0.04); }
  td { padding: 0.6rem 1.2rem; vertical-align: middle; line-height: 1.4; }
  .td-date { color: var(--text-muted); white-space: nowrap; font-size: 0.72rem; letter-spacing: 0.04em; }
  .td-year { color: var(--text-mid); white-space: nowrap; }
  .td-path { white-space: nowrap; }
  .path-tag { display: inline-block; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.18em 0.5em; border-radius: 2px; border: 1px solid var(--border); background: var(--tag-bg); color: var(--text-mid); }
  .td-name { color: var(--text); max-width: 55vw; word-break: break-word; }
  mark { background: var(--accent-dim); color: var(--accent); border-radius: 1px; padding: 0 1px; }
  .status { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 0.06em; }
  .status .icon { display: block; font-size: 2rem; margin-bottom: 1rem; opacity: 0.3; }
  @keyframes blink { 50% { opacity: 0; } }
  .blink { animation: blink 1s step-start infinite; }
  @media (max-width: 600px) {
    header { padding: 1.2rem 1rem 1rem; }
    th, td { padding: 0.5rem 0.75rem; }
    .td-name { font-size: 0.75rem; }
    .td-date { font-size: 0.68rem; }
    table { font-size: 0.75rem; min-width: 36rem; }
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>mlmongo.py output</h1>
    <span class="count-badge" id="counter">—</span>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="cerca per titolo..." autocomplete="off" spellcheck="false" disabled>
  </div>
</header>
<div class="table-wrap">
  <table id="table" style="display:none">
    <thead><tr>
      <th class="col-date">Data</th>
      <th class="col-name">Titolo</th>
      <th class="col-year">Anno</th>
      <th class="col-path">Percorso</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="status" id="status">
    <span class="icon">◌</span>caricamento<span class="blink">_</span>
  </div>
</div>
<script>
let DATA = [];

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(';');
    if (cols.length < 4) continue;
    rows.push({ p: cols[0], n: cols[1], y: cols[2], t: cols[3] });
  }
  return rows;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, query) {
  if (!query) return esc(text);
  const safe = esc(text);
  const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(`(${safeQ})`, 'gi'), '<mark>$1</mark>');
}

function render(query) {
  const q = query.trim().toLowerCase();
  const filtered = q ? DATA.filter(r => r.n.toLowerCase().includes(q)) : DATA;
  const counter = document.getElementById('counter');
  const tbody = document.getElementById('tbody');
  const status = document.getElementById('status');
  const table = document.getElementById('table');

  counter.textContent = filtered.length.toLocaleString('it-IT') + ' titoli';

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    table.style.display = 'none';
    status.innerHTML = '<span class="icon">◌</span>nessun risultato';
    status.style.display = '';
    return;
  }

  status.style.display = 'none';
  table.style.display = '';
  tbody.innerHTML = filtered.map(r =>
    `<tr>
      <td class="td-date col-date">${esc(r.t)}</td>
      <td class="td-name col-name">${highlight(r.n, query.trim())}</td>
      <td class="td-year col-year">${esc(r.y)}</td>
      <td class="td-path col-path"><span class="path-tag">${esc(r.p)}</span></td>
    </tr>`
  ).join('');
}

async function init() {
  const status = document.getElementById('status');
  try {
    const res = await fetch('list.csv');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    DATA = parseCSV(text);
    DATA.sort((a, b) => b.t.localeCompare(a.t));
    const search = document.getElementById('search');
    search.disabled = false;
    search.addEventListener('input', e => render(e.target.value));
    render('');
  } catch (err) {
    status.innerHTML = `<span class="icon">✕</span>impossibile caricare list.csv<br><small style="opacity:.5;display:block;margin-top:.5rem">${esc(err.message)}</small>`;
  }
}

function updateHeaderHeight() {
  const h = document.querySelector('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}
window.addEventListener('resize', updateHeaderHeight);

init().then(() => updateHeaderHeight());
// fallback immediate call
updateHeaderHeight();
</script>
</body>
</html>
