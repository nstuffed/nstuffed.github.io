<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Archive</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>🎬 Movie Archive</h1>
      <button id="theme-toggle" title="Cambia tema">🌓</button>
    </div>
    <div class="controls">
      <input type="text" id="search" placeholder="Cerca titolo, anno...">
      <!-- ✅ Filtro percorso come dropdown -->
      <select id="path-filter">
        <option value="">📁 Tutti i percorsi</option>
        <!-- Opzioni populate dinamicamente da JS -->
      </select>
      <!-- ✅ Filtro genere come dropdown -->
      <select id="genre-filter">
        <option value="">🎭 Tutti i generi</option>
        <!-- Opzioni populate dinamicamente da JS -->
      </select>
      <div class="dur-filter">
        <label>Durata max:</label>
        <input type="range" id="dur-slider" min="30" max="240" value="240" step="5">
        <span id="dur-value">Tutti</span>
      </div>
      <button id="random-btn" title="Film casuale">🎲</button>
    </div>
  </header>
  
  <main id="grid" class="grid">
    <div class="loading">Caricamento archivio...</div>
  </main>

  <!-- Progress Bar -->
  <div id="progress-container" class="progress-container hidden">
    <div class="progress-bar">
      <div id="progress-bar-fill" class="progress-bar-fill"></div>
    </div>
    <div id="progress-text" class="progress-text"></div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🔍 Correggi corrispondenza TMDB</h2>
        <button id="close-modal">✕</button>
      </div>
      <p id="modal-current">File: <span id="modal-movie-name"></span></p>
      
      <div class="manual-search">
        <input type="text" id="modal-search-input" placeholder="Digita il titolo corretto e premi Invio...">
        <button id="modal-search-btn">🔍 Cerca</button>
      </div>

      <div id="modal-results" class="modal-results"></div>
    </div>
  </div>


<!-- ✅ MODALE INFO FILM -->
<div id="info-modal" class="modal hidden">
  <div class="modal-content info-modal-content">
    <div class="info-modal-header">
      <h2 id="info-title">Dettaglio Film</h2>
      <button id="close-info-modal" class="close-btn">✕</button>
    </div>
    <div class="info-grid">
      <div class="info-poster">
        <a id="info-poster-link" class="info-poster-link" target="_blank" rel="noopener noreferrer" aria-label="Apri la pagina TMDB del film">
          <img id="info-poster-img" src="" alt="Poster">
          <div id="info-poster-placeholder" class="no-poster">🎬</div>
        </a>
      </div>
      <div class="info-details">
        <div class="info-section">
          <h3>📊 Informazioni TMDB</h3>
          <div class="info-row"><span class="label">Titolo:</span><span id="info-tmdb-title" class="value"></span></div>
          <div class="info-row"><span class="label">Uscita:</span><span id="info-release" class="value"></span></div>
          <div class="info-row"><span class="label">Durata:</span><span id="info-runtime" class="value"></span></div>
          <div class="info-row"><span class="label">Voto:</span><span id="info-rating" class="value"></span></div>
          <div class="info-row"><span class="label">Genere:</span><span id="info-genres" class="value"></span></div>
          <div class="info-row"><span class="label">Popolarità:</span><span id="info-popularity" class="value"></span></div>
        </div>
        <div class="info-section">
          <h3>📁 Dati Archivio (CSV)</h3>
          <div class="info-row"><span class="label">File:</span><span id="info-filename" class="value"></span></div>
          <div class="info-row"><span class="label">Percorso:</span><span id="info-path" class="value" title=""></span></div>
          <div class="info-row"><span class="label">Aggiunto il:</span><span id="info-time" class="value"></span></div>
        </div>
        <div class="info-section full-width">
          <h3>📝 Trama</h3>
          <p id="info-overview" class="overview-text"></p>
        </div>
      </div>
    </div>
  </div>
</div>

  <script src="/static/app.js"></script>
</body>
</html>
