<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogo Media</title>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #161b22;
      --panel-2: #1f2630;
      --text: #e6edf3;
      --muted: #9aa4b2;
      --accent: #58a6ff;
      --border: #2d3642;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #0b0f14 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 20px 36px;
    }
    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      flex-wrap: wrap;
    }
    .header h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2.2rem);
      letter-spacing: 0.02em;
    }
    .counter {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.9rem;
      flex-wrap: wrap;
    }
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      cursor: pointer;
    }
    .switch input {
      width: 38px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .sort-select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus {
      border-color: var(--accent);
    }

    .reset-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid #7c3e3e;
      color: #ff8a8a;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover {
      background: rgba(255, 80, 80, 0.1);
      border-color: #ff6b6b;
      color: #fff;
    }
    .reset-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Stile Barra Filtri */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .search-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 200px;
    }
    .search-box label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .search-box input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.25);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
    .card {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 14px;
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      min-height: 180px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
    }
    .poster {
      background: #0f141b;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .poster-placeholder {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .meta {
      padding: 12px 12px 12px 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .meta h2 {
      margin: 0;
      font-size: 1.04rem;
      line-height: 1.25;
      color: #f2f7ff;
    }
    .original-title {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .year {
      margin: 8px 0 0;
      color: #c9d2dc;
      font-size: 0.84rem;
    }
    .source-meta {
      margin: 6px 0 0;
      color: #aeb8c4;
      font-size: 0.82rem;
      line-height: 1.25;
      white-space: normal;
    }
    .source-meta strong {
      color: #d7e1ec;
      font-weight: 600;
    }
    .dot {
      color: #6f7a89;
      padding: 0 6px;
    }
    .desc {
      margin: 10px 0 0;
      color: #d4dbe3;
      font-size: 0.9rem;
      line-height: 1.34;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tmdb-link {
      margin-top: auto;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .tmdb-link:hover {
      text-decoration: underline;
    }
    /* Large Posters */
    .large-posters .grid {
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .large-posters .card {
      grid-template-columns: 1fr;
      min-height: auto;
    }
    .large-posters .poster {
      border-right: none;
      border-bottom: 1px solid var(--border);
      min-height: 390px;
      max-height: 420px;
    }
    .large-posters .poster img {
      object-fit: cover;
    }
    .large-posters .meta {
      padding: 12px;
    }
    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      padding: 18px 0 4px;
    }
    .loading.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>Catalogo Media</h1>
      <div class="controls">
        <label class="switch" for="large-mode-toggle">
          <span>Locandine grandi</span>
          <input id="large-mode-toggle" type="checkbox" />
        </label>
        
        <select id="sort-select" class="sort-select">
          <option value="default">Ordine Predefinito</option>
          <option value="year_asc">Anno (Crescente)</option>
          <option value="year_desc">Anno (Decrescente)</option>
          <!-- MODIFICA: Opzioni ordinamento Time -->
          <option value="time_asc">Aggiunta (Crescente)</option>
          <option value="time_desc">Aggiunta (Decrescente)</option>
          <option value="random">Casuale</option>
        </select>

        <button id="reset-filters-btn" class="reset-btn" type="button">
          <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
          Reset Filtri
        </button>

        <div class="counter" id="counter-display">0 titoli</div>
      </div>
    </header>

    <div class="filters">
      <div class="search-box">
        <label for="filter-title">Cerca Titolo</label>
        <input id="filter-title" type="text" placeholder="Es. Matrix, Interstellar..." />
      </div>
      <div class="search-box">
        <label for="filter-path">Filtra per Path</label>
        <input id="filter-path" type="text" placeholder="Es. /film, /serie..." />
      </div>
      <div class="search-box">
        <label for="filter-tag">Filtra per Tag</label>
        <input id="filter-tag" type="text" placeholder="Es. preferiti, da_vedere..." />
      </div>
      <div class="search-box">
        <label for="filter-name">Filtra per Name</label>
        <input id="filter-name" type="text" placeholder="Es. nome_file..." />
      </div>
    </div>

    <section id="catalog-grid" class="grid"></section>
    <div id="loading-indicator" class="loading hidden">Caricamento altri titoli...</div>
    <div id="end-indicator" class="loading hidden">Fine catalogo</div>
  </main>
  <script>
    const RAW_CARDS = ["<article class=\"card\" data-year=\"1961\" data-timestamp=\"1767913200\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/tjimQB2o7DR2zFXZugw5pY6VvU4.jpg\" alt=\"Poster La donna è donna\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>La donna è donna</h2>\n                <p class=\"original-title\">Une femme est une femme</p>\n                <p class=\"year\">1961 <span class=\"dot\">•</span> TMDB #31522</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> MULE</span> <span class=\"dot\">•</span> <span><strong>Tag:</strong> subita</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> A.Woman.Is.a.Woman.1961.subita.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2026-01-09</span></p>\n                <p class=\"desc\">Angela (Karina), giovane spogliarellista danese che lavora in un locale parigino, vorrebbe un figlio dal suo compagno, Emilio (Brialy), ma lui teme una trappola matrimoniale e non è d&#x27;accordo. Anzi, le suggerisce di prendersi come partner occasionale Alfredo (Belmondo), che di Angela è innamorato.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/31522\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2026\" data-timestamp=\"1775080800\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/bWniBa1w4Cb327bNSMJtqZXCp0H.jpg\" alt=\"Poster “Cime Tempestose”\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>“Cime Tempestose”</h2>\n                <p class=\"original-title\">&quot;Wuthering Heights&quot;</p>\n                <p class=\"year\">2026 <span class=\"dot\">•</span> TMDB #1316092</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> MULE</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Cime tempestose (2026).mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2026-04-02</span></p>\n                <p class=\"desc\">Una storia d&#x27;amore appassionata e tumultuosa ambientata sullo sfondo delle brughiere dello Yorkshire, che esplora la relazione intensa e distruttiva tra Heathcliff e Catherine Earnshaw.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/1316092\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2005\" data-timestamp=\"1758232800\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/ds7xUbQ4o5TVq9d9CEXge9UwF2E.jpg\" alt=\"Poster Dark Water\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Dark Water</h2>\n                <p class=\"original-title\">Dark Water</p>\n                <p class=\"year\">2005 <span class=\"dot\">•</span> TMDB #9009</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> MULE</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Dark.Water.2005.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2025-09-19</span></p>\n                <p class=\"desc\">Una giovane donna, con alcuni problemi, é decisa a lasciarsi alle spalle la storia col suo ex marito; cambia lavoro e casa e pensa solo a crescere nel miglior modo possibile sua figlia. Ma quando inizia una dura battaglia legale per la custodia della bambina, tutto le crolla addosso e per di più dalla sua nuova casa, si diffondono misteriosi e cupi rumori accompagnati da una strana perdita di acqua scura dal soffitto..</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/9009\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2021\" data-timestamp=\"1767913200\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/lbtR0iP8TlSho7kTUI8mfhBV8Vo.jpg\" alt=\"Poster Non cadrà più la neve\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Non cadrà più la neve</h2>\n                <p class=\"original-title\">Śniegu już nigdy nie będzie</p>\n                <p class=\"year\">2021 <span class=\"dot\">•</span> TMDB #726151</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> MULE</span> <span class=\"dot\">•</span> <span><strong>Tag:</strong> subita</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Never.Gonna.Snow.Again.2020.subita.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2026-01-09</span></p>\n                <p class=\"desc\">Zenia è un uomo misterioso, con un lavoro che gli permette di fare l’ingresso in una comunità alto-borghese formata da persone facoltose e chiuse, che conducono un’esistenza priva di stimoli. Annoiate da tutto e apatiche, vedono nell’arrivo dell’uomo una novità salvifica. Ognuno di loro ha una storia che confida a Zenia, terapista del corpo e dell’anima. Un guru, forse un falso profeta, oppure più semplicemente un appiglio per chi non riesce a fare i conti con questa strana vita.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/726151\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2022\" data-timestamp=\"1768172400\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/nWB2gL80xtxovQiPsVmufLdOG24.jpg\" alt=\"Poster I giovani amanti\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>I giovani amanti</h2>\n                <p class=\"original-title\">Les Jeunes Amants</p>\n                <p class=\"year\">2022 <span class=\"dot\">•</span> TMDB #811211</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> MULE</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> i giovani amanti 2021.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2026-01-12</span></p>\n                <p class=\"desc\">Shauna, donna raffinata, libera e indipendente, architetto in pensione, ha messo da parte e archiviato la sua vita sentimentale, ma tutto è destinato a cambiare quando si imbatte per caso in Pierre, un medico quarantacinquenne ora felicemente sposato e padre di famiglia, che l’aveva profondamente colpita in un breve incontro avvenuto quindici anni prima. Lui la vede ancora come una donna attraente, ma entrambi sono turbati dall’iniziare una relazione. Mentre la vita familiare di Pierre va presto a rotoli, Shauna lotta con emozioni e sentimenti che credeva appartenessero ormai al passato.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/811211\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1963\" data-timestamp=\"1767049200\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/vpkkNTAZ6d6M039cd8AE1p3zgC7.jpg\" alt=\"Poster Il disprezzo\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Il disprezzo</h2>\n                <p class=\"original-title\">Le Mépris</p>\n                <p class=\"year\">1963 <span class=\"dot\">•</span> TMDB #266</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> MULE</span> <span class=\"dot\">•</span> <span><strong>Tag:</strong> dual</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> il disprezzo 1963 dual.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2025-12-30</span></p>\n                <p class=\"desc\">Paul Javal, uno scrittore di gialli, viene chiamato da un produttore americano, Prokosch, per sceneggiare un film sull’Odissea che dovrebbe essere diretto da Fritz Lang. Il produttore corteggia apertamente Camille, la giovane moglie dello scrittore. Questo provoca la rottura definitiva fra i due sposi. Camille, nel tornare a Roma in compagnia del produttore, però, muore miseramente in un incidente a bordo dell’auto del produttore.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/266\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1978\" data-timestamp=\"1769382000\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/tJYP9DsJz5OMboAWj9dm3FRiZQR.jpg\" alt=\"Poster L&#x27;albero degli zoccoli\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>L&#x27;albero degli zoccoli</h2>\n                <p class=\"original-title\">L&#x27;albero degli zoccoli</p>\n                <p class=\"year\">1978 <span class=\"dot\">•</span> TMDB #31542</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> MULE</span> <span class=\"dot\">•</span> <span><strong>Tag:</strong> subita</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> l&#x27;albero degli zoccoli 1978 subita.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2026-01-26</span></p>\n                <p class=\"desc\">La casa, le stalle, la terra, gli alberi, parte del bestiame e degli attrezzi appartenevano al padrone e a lui si dovevano due parti su tre del raccolto. Dall&#x27;autunno alla primavera, quando il lavoro dei campi concedeva respiro riprendevano le vicende degli uomini coi loro sentimenti, le loro paure, le speranze, sia nelle cose di ogni giorno, che negli avvenimenti più importanti e attesi, come la nascita di un bambino, un matrimonio o la festa del paese. La vita era povera e tutto questo acquistava valore e significato. Nulla andava perduto: tutto poteva essere utile al corpo e all&#x27;anima. Ma a volte la volontà del padrone poteva portare via tutto, come una stagione maligna.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/31542\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2022\" data-timestamp=\"1678230000\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/h0IRfhDQKXgvrfPYxrNpPuCCGRu.jpg\" alt=\"Poster Babylon\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Babylon</h2>\n                <p class=\"original-title\">Babylon</p>\n                <p class=\"year\">2022 <span class=\"dot\">•</span> TMDB #615777</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Babylon 2022.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2023-03-08</span></p>\n                <p class=\"desc\">Un racconto memorabile ambientato nella Los Angeles degli anni ’20, una storia di ambizioni smisurate e di eccessi oltraggiosi, che ripercorre l&#x27;ascesa e la caduta di molteplici personaggi in un&#x27;epoca di sfrenata decadenza e depravazione nella sfavillante Hollywood.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/615777\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1965\" data-timestamp=\"1697752800\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/5B4zgEGXbgy1jRNoeVvYFDGgn3N.jpg\" alt=\"Poster Bunny Lake è scomparsa\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Bunny Lake è scomparsa</h2>\n                <p class=\"original-title\">Bunny Lake Is Missing</p>\n                <p class=\"year\">1965 <span class=\"dot\">•</span> TMDB #1942</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Bunny,Lake.E.Scomparsa.1965.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2023-10-20</span></p>\n                <p class=\"desc\">Londra, primi anni sessanta. Ann Lake, una giovane madre americana, è appena arrivata in Inghilterra dagli Stati Uniti, progettando di stabilirvisi con la figlia di 4 anni, Bunny, e suo fratello Stephen, giornalista. Al termine del primo giorno di scuola alla Little People&#x27;s School,  Ann va a prendere la bambina ma non la trova, e la scuola non ha nessuna registrazione a suo nome.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/1942\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1960\" data-timestamp=\"1607382000\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/v8KiSk28oivhwNTRxfwUpPlqoPx.jpg\" alt=\"Poster Crimen\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Crimen</h2>\n                <p class=\"original-title\">Crimen</p>\n                <p class=\"year\">1960 <span class=\"dot\">•</span> TMDB #157187</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Crimen 1960.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2020-12-08</span></p>\n                <p class=\"desc\">Sei persone si trovano casualmente sullo stesso treno diretto in Costa Azzurra, ciascuna con un diverso scopo: c&#x27;è chi vuole sbancare il casinò, chi deve restituire un cane smarrito alla proprietaria, chi deve raggiungere la moglie in vacanza. Tutti vengono successivamente sospettati dell&#x27;omicidio di una ricca signora di Montecarlo. Benché siano innocenti, fanno di tutto per mettersi nei guai.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/157187\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2002\" data-timestamp=\"1733094000\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/6qOJ6COcbJ3X8JmZI6A7VroGsn2.jpg\" alt=\"Poster Dieci\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Dieci</h2>\n                <p class=\"original-title\">ده</p>\n                <p class=\"year\">2002 <span class=\"dot\">•</span> TMDB #14633</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Dieci.2002.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2024-12-02</span></p>\n                <p class=\"desc\">Un&#x27;indagine sociale in dieci conversazioni tra una tassista iraniana e i suoi ospiti e passeggeri.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/14633\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1986\" data-timestamp=\"1722981600\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/mlvQQMbyJyZRQ72SO116XmoZ10m.jpg\" alt=\"Poster Il mattino dopo\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Il mattino dopo</h2>\n                <p class=\"original-title\">The Morning After</p>\n                <p class=\"year\">1986 <span class=\"dot\">•</span> TMDB #31924</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Il.Mattino.Dopo.The.Morning.After.1986.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2024-08-07</span></p>\n                <p class=\"desc\">Alex è un&#x27;attrice fallita e se >Aggiunta:</strong> 2023-05-08</span></p>\n                <p class=\"desc\">Il corpo senza vita di una ragazza viene trovato su una spiaggia di Los Angeles. La polizia archivia subito il fatto come suicidio, ma questa ipotesi non convince il padre della ragazza, Marty Hollinger, e il detective Phil Gaines. I due proseguono le indagini nel mondo della droga e della prostituzione frequentato dalla ragazza e scoprono che le fila del delitto conducono a un insospettabile avvocato. Hollinger lo trova e lo uccide ma Phil riuscirà a non fare incriminare il disperato genitore.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/4990\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1979\" data-timestamp=\"1745013600\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/1D4rokeM8Xu6YntZuz0SHWuEVlR.jpg\" alt=\"Poster Veloci di mestiere\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Veloci di mestiere</h2>\n                <p class=\"original-title\">Fast Company</p>\n                <p class=\"year\">1979 <span class=\"dot\">•</span> TMDB #38493</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Veloci.di.mestiere-Fast.Company.1979.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2025-04-19</span></p>\n                <p class=\"desc\">Lonnie, campione di dragster scaricato dal suo manager, Phil, cerca di costruirsi una carriera da indipendendente. Decide così di entrare a far parte della categoria dei funny cars.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/38493\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2022\" data-timestamp=\"1685916000\ nni &#x27;60 e &#x27;70 e della loro lotta per sviluppare la FIV contro ogni aspettativa.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/1184495\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1997\" data-timestamp=\"1680645600\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/dCvCSy6MiLXx108WX1wYfR5jpVN.jpg\" alt=\"Poster L&#x27;ultimo contratto\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>L&#x27;ultimo contratto</h2>\n                <p class=\"original-title\">Grosse Pointe Blank</p>\n                <p class=\"year\">1997 <span class=\"dot\">•</span> TMDB #9434</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> l&#x27;ultimo contratto 1997.mp4</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2023-04-05</span></p>\n                <p class=\"desc\">Pur con un grosso conto in banca, frutto di molti omicidi a pagamento, Martin Q. Blank (Cusack) è insoddisfatto. È in cura da un riluttante psicanalista (Arkin) e quando la sua segretaria (Joan Cusack) gli passa l&#x27;invito di andare a Grosse Pointe per la riunione decennale dei suoi compagni di liceo, accetta. In quella cittadina, tra l&#x27;altro, ha un lavoretto da fare. Lì la sua crisi si aggrava nel conflitto tra passato e presente. &quot;È una riflessione non troppo seria sul sistema di valori americano&quot; (John Cusack, anche coproduttore e cosceneggiatore). Intelligente, però. Nonostante il versante pulp alla Tarantino (il dialogo tra Cusack e Aykroyd con le pistole sotto il tavolo), è una black comedy più seria di quel che appare: attraverso la parodia dei generi traspare la satira. Lo sguardo del regista è quello del cinema degli anni &#x27;70, la colonna sonora è degli anni &#x27;80 (Clash, Cure, Echo and the Bunnymen, Siouxsie and the Banshees). Armitage è un regista da rivalutare.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/9434\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1979\" data-timestamp=\"1743544800\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/yviy484mFeBvVb7m8owJgLOMorn.jpg\" alt=\"Poster L&#x27;amore fugge\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>L&#x27;amore fugge</h2>\n                <p class=\"original-title\">L&#x27;Amour en fuite</p>\n                <p class=\"year\">1979 <span class=\"dot\">•</span> TMDB #259</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK</span> <span class=\"dot\">•</span> <span><strong>Tag:</strong> dual</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> l.amore.fugge.1979.dual.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2025-04-02</span></p>\n                <p class=\"desc\">Antoine Doinel ha pubblicato il libro &quot;Insalate d&#x27;amore&quot; e ha una relazione con Sabine, commessa in un negozio di dischi. Intanto deve occuparsi del divorzio dalla moglie Christine. Accompagnando il figlio alla stazione incontra coleì che aveva corteggiato da giovane, Colette.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/259\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"1975\" data-timestamp=\"1690408800\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/tCbzYiyNehrZWaWBplYxsHTIxZg.jpg\" alt=\"Poster Macchie solari\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Macchie solari</h2>\n                <p class=\"original-title\">Macchie solari</p>\            </div>\n            </article>", "<article class=\"card\" data-year=\"2023\" data-timestamp=\"1709420400\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/9uauZgPWrD61gb4gMH6tFNPFAbI.jpg\" alt=\"Poster Menus-Plaisirs, les Troisgros\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Menus-Plaisirs, les Troisgros</h2>\n                <p class=\"original-title\">Menus-Plaisirs, les Troisgros</p>\n                <p class=\"year\">2023 <span class=\"dot\">•</span> TMDB #1077050</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK/SANDRO</span> <span class=\"dot\">•</span> <span><strong>Tag:</strong> engsub</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> Menus-Plaisirs _ Les Troisgros 2023 engsub.mkv</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2024-03-03</span></p>\n                <p class=\"desc\">Founded in 1930, Troisgros has held three Michelin stars for 55 years. The children of the fourth generation, Marie-Pierre and Michel&#x27;s sons are continuing the family business: César runs the Michelin-starred restaurant, &quot;Le Bois sans feuilles&quot; (&quot;The Leafless Wood&quot;), and Léo is in charge of one of the other two Troisgros restaurants, &quot;La Colline du colombier&quot; (&quot;The Dovecote Hill&quot;). From the daily market to the cheese maturing cellars, via the vineyard, the cattle farm and the vegetable garden adjacent to the restaurant, Menus-Plaisirs is an intimate, sensory journey through the kitchens of one of the world&#x27;s most prestigious restaurants.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/1077050\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2025\" data-timestamp=\"1747087200\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/ 025-05-28</span></p>\n                <p class=\"desc\">Il sangue di &quot;saw&quot; la scorsa stagione ci aveva sconvolto con un film in cui il liquido rosso sgorgava copioso, senza motivo, innalzando il dramma a una sorta di gioco per la morte inutile e gratuito. Oggi Creep, che aveva tutte le carte in regola per essere l&#x27;anti The descent, film crepuscolare ambientato meravigliosamente nelle profondità della terra, diviene un nuovo massacro granguignolesco, tralasciando una sceneggiatura che solo nell&#x27;incipit consegna qualche spunto interessante. A Londra, Kate (Franka Potente) deve prendere l&#x27;ultimo metrò per lanciarsi in una notte glamour. Perso un treno, dopo essersi addormentata, ne prende un altro al volo, senza rendersi conto della direzione che prenderà. Il treno si ferma, le luci si spengono, e l&#x27;oscurità prende il sopravvento. L&#x27;incubo inizia.</p>\n                <a class=\"tmdb-link\" href=\"https://www.themoviedb.org/movie/8555\" target=\"_blank\" rel=\"noopener\">Apri su TMDB</a>\n              </div>\n            </article>", "<article class=\"card\" data-year=\"2023\" data-timestamp=\"1737759600\">\n              <div class=\"poster\"><img src=\"https://image.tmdb.org/t/p/w500/c5kky6KSYWzp6lUjgY4is2NWvRc.jpg\" alt=\"Poster Creep Box\" loading=\"lazy\" /></div>\n              <div class=\"meta\">\n                <h2>Creep Box</h2>\n                <p class=\"original-title\">Creep Box</p>\n                <p class=\"year\">2023 <span class=\"dot\">•</span> TMDB #1213602</p>\n                <p class=\"source-meta\"><span><strong>Path:</strong> BRiCK/SANDRO</span> <span class=\"dot\">•</span> <span><strong>Tag:</strong> engsub</span> <span class=\"dot\">•</span> <span><strong>Name:</strong> creep.box.2023.engsub.mp4</span> <span class=\"dot\">•</span> <span><strong>Aggiunta:</strong> 2025-01-25</span></p>\n                <p class=\"desc\">A scientist tries to speak with dead people with a machine he invented.</p>\n     const nameInput = document.getElementById("filter-name");

    function renderNextBatch() {
      if (loading || rendered >= filteredItems.length) {
        if (rendered >= filteredItems.length && filteredItems.length > 0) {
          endIndicator.classList.remove("hidden");
        } else if (filteredItems.length === 0) {
          endIndicator.textContent = "Nessun risultato trovato";
          endIndicator.classList.remove("hidden");
        }
        return;
      }
      
      loading = true;
      loadingIndicator.classList.remove("hidden");

      const next = filteredItems.slice(rendered, rendered + BATCH_SIZE);
      const fragment = document.createDocumentFragment();
      
      next.forEach((item) => {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = item.html;
        fragment.appendChild(wrapper.firstElementChild);
      });
      
      grid.appendChild(fragment);
      rendered += next.length;

      loading = false;
      loadingIndicator.classList.add("hidden");
      
      if (rendered >= filteredItems.length) {
        endIndicator.textContent = "Fine catalogo";
        endIndicator.classList.remove("hidden");
      }
    }

    function applyFilters() {
      const titleVal = titleInput.value.toLowerCase().trim();
      const pathVal = pathInput.value.toLowerCase().trim();
      const tagVal = tagInput.value.toLowerCase().trim();
      const nameVal = nameInput.value.toLowerCase().trim();
      const sortVal = sortSelect.value;

      grid.innerHTML = "";
      rendered = 0;
      endIndicator.classList.add("hidden");
      
      filteredItems = ITEMS.filter(item => {
        const matchTitle = item.title.includes(titleVal);
        const matchPath = item.path.includes(pathVal);
        const matchTag = item.tag.includes(tagVal);
        const matchName = item.name.includes(nameVal);
        return matchTitle && matchPath && matchTag && matchName;
      });

      // 2. Ordinamento
      if (sortVal === 'year_asc') {
        filteredItems.sort((a, b) => a.year - b.year);
      } else if (sortVal === 'year_desc') {
        filteredItems.sort((a, b) => b.year - a.year);
      } else if (sortVal === 'time_asc') {
        // MODIFICA: Ordinamento per Aggiunta (Crescente)
        filteredItems.sort((a, b) => a.timestamp - b.timestamp);
      } else if (sortVal === 'time_desc') {
        // MODIFICA: Ordinamento per Aggiunta (Decrescente)
        filteredItems.sort((a, b) => b.timestamp - a.timestamp);
      } else if (sortVal === 'random') {
        filteredItems.sort(() => Math.random() - 0.5);
      } else if (sortVal === 'default') {
        filteredItems.sort((a, b) => a.index - b.index);
      }

      counterDisplay.textContent = `${filteredItems.length} titoli`;
      renderNextBatch();
    }

    function resetFilters() {
      titleInput.value = "";
      pathInput.value = "";
      tagInput.value = "";
      nameInput.value = "";
      sortSelect.value = "default";
      largeModeToggle.checked = false;
      document.body.classList.remove("large-posters");
      applyFilters();
    }

    function maybeLoadMore() {
      const threshold = 360;
      const remaining = document.documentElement.scrollHeight - (window.innerHeight + window.scrollY);
      if (remaining < threshold) {
        renderNextBatch();
      }
    }

    largeModeToggle.addEventListener("change", () => {
      document.body.classList.toggle("large-posters", largeModeToggle.checked);
    });

    sortSelect.addEventListener("change", applyFilters);
    resetFiltersBtn.addEventListener("click", resetFilters);

    let timeout;
    const debounce = (func, delay) => {
      return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), delay);
      };
    };

    const debouncedFilter = debounce(applyFilters, 300);

    [titleInput, pathInput, tagInput, nameInput].forEach(input => {
      input.addEventListener("input", debouncedFilter);
    });

    window.addEventListener("scroll", maybeLoadMore, { passive: true });
    window.addEventListener("resize", maybeLoadMore);

    counterDisplay.textContent = `${ITEMS.length} titoli`;
    filteredItems = [...ITEMS];
    renderNextBatch();
    maybeLoadMore();
  </script>
</body>
</html>
