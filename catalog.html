<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mlmongo.py catalog</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #161b22;
      --panel-2: #1f2630;
      --text: #e6edf3;
      --muted: #9aa4b2;
      --accent: #58a6ff;
      --border: #2d3642;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #0b0f14 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 20px 36px;
    }
    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      flex-wrap: wrap;
    }
    .header h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2.2rem);
      letter-spacing: 0.02em;
    }
    .counter {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.9rem;
      flex-wrap: wrap;
    }
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      cursor: pointer;
    }
    .switch input {
      width: 38px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .sort-select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus {
      border-color: var(--accent);
    }

    .reset-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid #7c3e3e;
      color: #ff8a8a;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover {
      background: rgba(255, 80, 80, 0.1);
      border-color: #ff6b6b;
      color: #fff;
    }
    .reset-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .search-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .search-box label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .search-box input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.25);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
    .card {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 14px;
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      min-height: 180px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
    }
    .poster {
      background: #0f141b;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .poster-placeholder {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .meta {
      padding: 12px 12px 12px 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .meta h2 {
      margin: 0;
      font-size: 1.04rem;
      line-height: 1.25;
      color: #f2f7ff;
    }
    .original-title {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .year {
      margin: 8px 0 0;
      color: #c9d2dc;
      font-size: 0.84rem;
    }
    .source-meta {
      margin: 6px 0 0;
      color: #aeb8c4;
      font-size: 0.82rem;
      line-height: 1.25;
      white-space: normal;
      display: none; 
    }
    .source-meta strong {
      color: #d7e1ec;
      font-weight: 600;
    }
    .dot {
      color: #6f7a89;
      padding: 0 6px;
    }
    .desc {
      margin: 10px 0 0;
      color: #d4dbe3;
      font-size: 0.9rem;
      line-height: 1.34;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tmdb-link {
      margin-top: auto;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .tmdb-link:hover {
      text-decoration: underline;
    }
    
    .large-posters .grid {
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .large-posters .card {
      grid-template-columns: 1fr;
      min-height: auto;
    }
    .large-posters .poster {
      border-right: none;
      border-bottom: 1px solid var(--border);
      min-height: 390px;
      max-height: 420px;
    }
    .large-posters .poster img {
      object-fit: cover;
    }
    .large-posters .meta {
      padding: 12px;
    }
    .large-posters .source-meta {
      display: block;
    }
    .large-posters .desc {
      -webkit-line-clamp: 10;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      padding: 18px 0 4px;
    }
    .loading.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>mlmongo.py catalog [<a href="/">index</a>]</h1>
      <div class="controls">
        <label class="switch" for="large-mode-toggle">
          <span>locandine grandi</span>
          <input id="large-mode-toggle" type="checkbox" />
        </label>
        
        <select id="sort-select" class="sort-select">
          <option value="default">ordine predefinito</option>
          <option value="year_asc">anno (crescente)</option>
          <option value="year_desc">anno (decrescente)</option>
          <option value="time_asc">aggiunta (crescente)</option>
          <option value="time_desc" selected>aggiunta (decrescente)</option>
          <option value="random">casuale</option>
        </select>

        <button id="reset-filters-btn" class="reset-btn" type="button">
          <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
          reset filtri
        </button>

        <div class="counter" id="counter-display">0 titoli</div>
      </div>
    </header>

    <div class="filters">
      <div class="search-box">
        <label for="filter-title">cerca titolo</label>
        <input id="filter-title" type="text" />
      </div>
      <div class="search-box">
        <label for="filter-runtime">durata max (minuti)</label>
        <input id="filter-runtime" type="number" min="1" placeholder="es. 95" />
      </div>
      <div class="search-box">
        <label for="filter-path">filtra per path</label>
        <input id="filter-path" type="text" placeholder="gtfo, brick..." />
      </div>
      <div class="search-box">
        <label for="filter-tag">filtra per tag</label>
        <input id="filter-tag" type="text" placeholder="subita, dual, -engsub..." />
      </div>
      <div class="search-box">
        <label for="filter-name">filtra per name</label>
        <input id="filter-name" type="text" />
      </div>
    </div>

    <section id="catalog-grid" class="grid"></section>
    <div id="loading-indicator" class="loading hidden">caricamento altri titoli...</div>
    <div id="end-indicator" class="loading hidden">[EOF]</div>
  </main>

    const escapeHtml = (unsafe) => {
      return unsafe
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
    }

    let DATA = [];
    let filteredItems = [];
    let rendered = 0;
    let loading = false;
    const BATCH_SIZE = 20;

    function decompressData(base64Str) {
      try {
        const binaryString = atob(base64Str);
        const charData = binaryString.split('').map(function(x){return x.charCodeAt(0);});
        const binData = new Uint8Array(charData);
        
        const unpackedData = pako.ungzip(binData);
        const textDecoder = new TextDecoder("utf-8");
        const strData = textDecoder.decode(unpackedData);
        
        return JSON.parse(strData);
      } catch (e) {
        console.error("Errore decompressione:", e);
        return [];
      }
    }

    function createCardElement(item, index) {
      const article = document.createElement('article');
      article.className = 'card';
      
      const posterDiv = document.createElement('div');
      posterDiv.className = 'poster';
      if (item.poster_url) {
        const img = document.createElement('img');
        img.src = item.poster_url;
        img.alt = `poster ${escapeHtml(item.title)}`;
        img.loading = "lazy";
        posterDiv.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'poster-placeholder';
        ph.textContent = 'no poster';
        posterDiv.appendChild(ph);
      }
      article.appendChild(posterDiv);

      const metaDiv = document.createElement('div');
      metaDiv.className = 'meta';

      const h2 = document.createElement('h2');
      h2.textContent = item.title;
      metaDiv.appendChild(h2);

      if (item.original_title) {
        const pOrig = document.createElement('p');
        pOrig.className = 'original-title';
        pOrig.textContent = item.original_title;
        metaDiv.appendChild(pOrig);
      }

      const pYear = document.createElement('p');
      pYear.className = 'year';
      let yearHtml = escapeHtml(item.year_str);
      if (item.runtime_str) {
        yearHtml += ` <span class="dot">•</span> ${escapeHtml(item.runtime_str)}`;
      }
      pYear.innerHTML = yearHtml;
      metaDiv.appendChild(pYear);

      const sourceParts = [];
      if (item.path) sourceParts.push(`<span><strong>path:</strong> ${escapeHtml(item.path)}</span>`);
      if (item.tag) sourceParts.push(`<span><strong>tag:</strong> ${escapeHtml(item.tag)}</span>`);
      if (item.name) sourceParts.push(`<span><strong>name:</strong> ${escapeHtml(item.name)}</span>`);
      if (item.time_str) sourceParts.push(`<span><strong>aggiunta:</strong> ${escapeHtml(item.time_str)}</span>`);

      if (sourceParts.length > 0) {
        const pMeta = document.createElement('p');
        pMeta.className = 'source-meta';
        pMeta.innerHTML = sourceParts.join(' <br> ');
        metaDiv.appendChild(pMeta);
      }

      if (item.description) {
        const pDesc = document.createElement('p');
        pDesc.className = 'desc';
        pDesc.textContent = item.description;
        metaDiv.appendChild(pDesc);
      }

      if (item.tmdb_url) {
        const aTmdb = document.createElement('a');
        aTmdb.className = 'tmdb-link';
        aTmdb.href = item.tmdb_url;
        aTmdb.target = "_blank";
        aTmdb.rel = "noopener";
        aTmdb.textContent = "apri su TMDB";
        metaDiv.appendChild(aTmdb);
      }

      article.appendChild(metaDiv);
      return article;
    }

    const grid = document.getElementById("catalog-grid");
    const loadingIndicator = document.getElementById("loading-indicator");
    const endIndicator = document.getElementById("end-indicator");
    const largeModeToggle = document.getElementById("large-mode-toggle");
    const sortSelect = document.getElementById("sort-select");
    const resetFiltersBtn = document.getElementById("reset-filters-btn");
    const counterDisplay = document.getElementById("counter-display");
    
    const titleInput = document.getElementById("filter-title");
    const runtimeInput = document.getElementById("filter-runtime");
    const pathInput = document.getElementById("filter-path");
    const tagInput = document.getElementById("filter-tag");
    const nameInput = document.getElementById("filter-name");

    function renderNextBatch() {
      if (loading || rendered >= filteredItems.length) {
        if (rendered >= filteredItems.length && filteredItems.length > 0) {
          endIndicator.classList.remove("hidden");
        } else if (filteredItems.length === 0) {
          endIndicator.textContent = "nessun risultato trovato";
          endIndicator.classList.remove("hidden");
        }
        return;
      }
      
      loading = true;
      loadingIndicator.classList.remove("hidden");

      const fragment = document.createDocumentFragment();
      for (let i = rendered; i < Math.min(rendered + BATCH_SIZE, filteredItems.length); i++) {
        const item = filteredItems[i];
        const cardEl = createCardElement(item, i);
        fragment.appendChild(cardEl);
      }
      
      grid.appendChild(fragment);
      rendered = Math.min(rendered + BATCH_SIZE, filteredItems.length);

      loading = false;
      loadingIndicator.classList.add("hidden");
      
      if (rendered >= filteredItems.length) {
        endIndicator.textContent = "[EOF]";
        endIndicator.classList.remove("hidden");
      }
    }

    function applyFilters() {
      const titleVal = titleInput.value.toLowerCase().trim();
      const runtimeVal = runtimeInput.value.trim();
      const pathVal = pathInput.value.toLowerCase().trim();
      const tagVal = tagInput.value.toLowerCase().trim();
      const nameVal = nameInput.value.toLowerCase().trim();
      const sortVal = sortSelect.value;

      grid.innerHTML = "";
      rendered = 0;
      endIndicator.classList.add("hidden");

      const tagFilters = tagVal.split(',').map(t => t.trim()).filter(t => t);
      const excludeTags = tagFilters.filter(t => t.startsWith('-')).map(t => t.substring(1));
      const includeTags = tagFilters.filter(t => !t.startsWith('-'));

      const maxRuntime = runtimeVal ? parseInt(runtimeVal, 10) : null;

      filteredItems = DATA.filter(item => {
        const matchTitle = item.title.toLowerCase().includes(titleVal);
        const matchPath = item.path.toLowerCase().includes(pathVal);
        const matchName = item.name.toLowerCase().includes(nameVal);

        // Filtro per durata: esclude i film se l'input è valido ed è minore della durata del film
        // Se il film ha durata 0 o non pervenuta, viene escluso solo se è stato impostato un limite.
        let matchRuntime = true;
        if (maxRuntime !== null) {
          matchRuntime = item.runtime_val > 0 && item.runtime_val <= maxRuntime;
        }

        let matchTag = true;
        if (includeTags.length > 0) {
          matchTag = includeTags.some(tag => item.tag.toLowerCase().includes(tag));
        }
        if (excludeTags.length > 0) {
          matchTag = matchTag && !excludeTags.some(tag => item.tag.toLowerCase().includes(tag));
        }

        return matchTitle && matchRuntime && matchPath && matchTag && matchName;
      });

      if (sortVal === 'year_asc') {
        filteredItems.sort((a, b) => a.year_val - b.year_val);
      } else if (sortVal === 'year_desc') {
        filteredItems.sort((a, b) => b.year_val - a.year_val);
      } else if (sortVal === 'time_asc') {
        filteredItems.sort((a, b) => a.timestamp_val - b.timestamp_val);
      } else if (sortVal === 'time_desc') {
        filteredItems.sort((a, b) => b.timestamp_val - a.timestamp_val);
      } else if (sortVal === 'random') {
        filteredItems.sort(() => Math.random() - 0.5);
      }

      counterDisplay.textContent = `${filteredItems.length} titoli`;
      renderNextBatch();
    }

    function resetFilters() {
      titleInput.value = "";
      runtimeInput.value = "";
      pathInput.value = "";
      tagInput.value = "";
      nameInput.value = "";
      sortSelect.value = "time_desc";
      largeModeToggle.checked = false;
      document.body.classList.remove("large-posters");
      applyFilters();
    }

    function maybeLoadMore() {
      const threshold = 360;
      const remaining = document.documentElement.scrollHeight - (window.innerHeight + window.scrollY);
      if (remaining < threshold) {
        renderNextBatch();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadingIndicator.textContent = "unzipping...";
      loadingIndicator.classList.remove("hidden");
      
      setTimeout(() => {
        if (typeof pako === 'undefined') {
          loadingIndicator.textContent = "error: pako lib not found";
          return;
        }
        
        try {
          DATA = decompressData(ZIPPED_DATA);
          loadingIndicator.textContent = "init...";
          
          largeModeToggle.addEventListener("change", () => {
            document.body.classList.toggle("large-posters", largeModeToggle.checked);
          });

          sortSelect.addEventListener("change", applyFilters);
          resetFiltersBtn.addEventListener("click", resetFilters);

          const debounce = (func, delay) => {
            let timeout;
            return (...args) => {
              clearTimeout(timeout);
              timeout = setTimeout(() => func.apply(this, args), delay);
            };
          };

          const debouncedFilter = debounce(applyFilters, 300);

          [titleInput, runtimeInput, pathInput, tagInput, nameInput].forEach(input => {
            input.addEventListener("input", debouncedFilter);
          });

          window.addEventListener("scroll", maybeLoadMore, { passive: true });
          window.addEventListener("resize", maybeLoadMore);

          counterDisplay.textContent = `${DATA.length} titoli`;
          filteredItems = [...DATA];
          applyFilters();
          
        } catch (e) {
          console.error(e);
          loadingIndicator.textContent = "errore elaborazione dati: " + e.message;
        }
      }, 100);
    });
  </script>
</body>
</html>
